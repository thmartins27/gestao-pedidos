<header class="topbar-wrapper">
  <mat-toolbar class="topbar">
    <div class="title-container">
      <mat-icon>store</mat-icon>
      <span class="brand">Gestão de Pedidos</span>
    </div>

    <button mat-icon-button class="menu-toggle" (click)="toggleMenu()" aria-label="Abrir menu">
      <mat-icon>menu</mat-icon>
    </button>
  </mat-toolbar>

  @if (menuAberto()) {
  <nav class="menu-mobile">
    @for (item of itensMenu; track item.rota) {
    <a [routerLink]="item.rota" routerLinkActive="active" (click)="fecharMenu()">
      <mat-icon>{{ item.icone }}</mat-icon>
      {{ item.label }}
    </a>
    }
  </nav>
  }
</header>

@if (menuAberto()) {
<div class="overlay" (click)="fecharMenu()"></div>
}

<div class="body">
  <nav class="sidebar">
    @for (item of itensMenu; track item.rota) {
    <a [routerLink]="item.rota" routerLinkActive="active">
      <mat-icon>{{ item.icone }}</mat-icon>
      {{ item.label }}
    </a>
    }
  </nav>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
