<div class="header">
  <div>
    <h1>Produtos</h1>
    <p class="subtitle">Consulte os produtos cadastrados</p>
  </div>
</div>

@if (carregando()) {
<app-estado-carregando mensagem="Carregando produtos…"></app-estado-carregando>
} @else if (erro()) {
<app-estado-erro (tentarNovamente)="carregarProdutos()"></app-estado-erro>
} @else if (produtos().length === 0) {
<app-estado-vazio
  titulo="Nenhum produto cadastrado"
  subtitulo="Cadastre o primeiro produto para começar."
  acaoLabel="Novo produto"
  acaoRota="/novo-produto"
>
</app-estado-vazio>
} @else {
<div class="tabela-card">
  <table mat-table [dataSource]="produtos()">
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let produto">{{ produto.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="preco">
      <th mat-header-cell *matHeaderCellDef class="col-valor">Preço</th>
      <td mat-cell *matCellDef="let produto" class="col-valor">
        {{ produto.preco | currency: 'BRL' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="estoqueAtual">
      <th mat-header-cell *matHeaderCellDef class="col-centro">Estoque</th>
      <td
        mat-cell
        *matCellDef="let produto"
        class="col-centro"
        [class.sem-estoque]="produto.estoqueAtual === 0"
      >
        {{ produto.estoqueAtual }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas"></tr>
  </table>

  <mat-paginator
    [length]="totalItens()"
    [pageSize]="pageSize()"
    [pageIndex]="pagina() - 1"
    [pageSizeOptions]="[5, 10, 25]"
    (page)="onMudarPagina($event)"
  >
  </mat-paginator>
</div>
}
