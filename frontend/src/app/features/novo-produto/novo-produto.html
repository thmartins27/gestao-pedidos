<div class="header">
  <h1>Novo produto</h1>
  <p class="subtitle">Cadastre um novo produto no catálogo</p>
</div>

<div class="card formulario">
  <mat-form-field appearance="outline" class="campo">
    <mat-label>Nome</mat-label>
    <input matInput [ngModel]="nome()" (ngModelChange)="nome.set($event)" required maxlength="200" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="campo">
    <mat-label>Preço</mat-label>
    <input
      matInput
      type="number"
      min="0.01"
      step="0.01"
      [ngModel]="preco()"
      (ngModelChange)="preco.set($event)"
      required
    />
  </mat-form-field>

  <mat-form-field appearance="outline" class="campo">
    <mat-label>Estoque inicial</mat-label>
    <input
      matInput
      type="number"
      min="1"
      [ngModel]="estoqueAtual()"
      (ngModelChange)="estoqueAtual.set($event)"
      required
    />
  </mat-form-field>

  <button
    mat-flat-button
    class="botao-criar"
    (click)="criarProduto()"
    [disabled]="!formValido() || salvando()"
  >
    <mat-icon>check</mat-icon>
    {{ salvando() ? 'Cadastrando…' : 'Cadastrar produto' }}
  </button>
</div>
