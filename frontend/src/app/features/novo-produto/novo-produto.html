<div class="header">
  <h1>Novo produto</h1>
  <p class="subtitle">Cadastre um novo produto no catálogo</p>
</div>

<div class="card formulario" [formGroup]="form">
  <mat-form-field appearance="outline" class="campo">
    <mat-label>Nome</mat-label>
    <input matInput formControlName="nome" maxlength="200" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="campo">
    <mat-label>Preço</mat-label>
    <input matInput type="number" min="0.01" step="0.01" formControlName="preco" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="campo">
    <mat-label>Estoque inicial</mat-label>
    <input matInput type="number" min="1" formControlName="estoqueAtual" />
  </mat-form-field>

  <button
    mat-flat-button
    class="botao-criar"
    (click)="criarProduto()"
    [disabled]="form.invalid || salvando()"
  >
    <mat-icon>check</mat-icon>
    {{ salvando() ? 'Cadastrando…' : 'Cadastrar produto' }}
  </button>
</div>
