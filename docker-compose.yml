services:
  postgres:
    image: postgres:17-alpine
    container_name: gestaopedidos-db
    environment:
      POSTGRES_USER: gestao
      POSTGRES_PASSWORD: gestao123
      POSTGRES_DB: gestaopedidos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestao -d gestaopedidos"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: