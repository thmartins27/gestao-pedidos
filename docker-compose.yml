services:
  postgres:
    image: postgres:17-alpine
    container_name: gestaopedidos-db
    environment:
      POSTGRES_USER: gestao
      POSTGRES_PASSWORD: gestao123
      POSTGRES_DB: gestaopedidos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestao -d gestaopedidos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: GestaoPedidos.Api/Dockerfile
    container_name: gestaopedidos-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=gestaopedidos;Username=gestao;Password=gestao123"
    ports:
      - "5196:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: gestaopedidos-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
